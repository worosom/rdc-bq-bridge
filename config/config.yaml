# Configuration for RDC-BigQuery Bridge

redis:
  # host: "localhost"
  host: "10.23.104.21"
  port: 6379
  db: 0
  # password: null
  user: default
  password: DADmin#100
  decode_responses: false
  socket_keepalive: true
  socket_keepalive_options:
    TCP_KEEPIDLE: 120
    TCP_KEEPINTVL: 30
    TCP_KEEPCNT: 3

pipeline:
  routing_rules:
    - name: "BioSensors"
      redis_source_type: "channel"
      redis_pattern: "Wearables:WatchDevices:*:BioSensors"
      target_table: "empatica"
      id_parser_regex: "Wearables:WatchDevices:(?P<device_id>[^:]+):BioSensors"
      value_is_object: true

    - name: "Position"
      redis_source_type: "channel"
      redis_pattern: "Wearables:WatchDevices:*:BlueIoTSensors"
      target_table: "blueiot"
      id_parser_regex: "Wearables:WatchDevices:(?P<device_id>[^:]+):BlueIoTSensors"
      value_is_object: true

    - name: "Scent"
      redis_source_type: "key"
      redis_pattern: "Wearables:Scent:*"
      target_table: "global_state_events"
      id_parser_regex: "(?P<state_key>.*)" # Capture the entire key as state_key
      value_is_object: false

    - name: "WatchDevices"
      redis_source_type: "key"
      redis_pattern: "Wearables:WatchDevices:*"
      target_table: "global_state_events"
      id_parser_regex: "(?P<state_key>.*)" # Capture the entire key as state_key
      value_is_object: false

    - name: "VisitorRegister"
      redis_source_type: "channel"
      redis_pattern: "Visitors:Register"
      target_table: "global_state_events"
      id_parser_regex: "(?P<state_key>.*)" # Capture the entire key as state_key
      value_is_object: true

    - name: "VisitorStatus"
      redis_source_type: "key"
      redis_pattern: "Visitors:*:Status"
      target_table: "global_state_events"
      id_parser_regex: "Visitors:(?P<ticket_id>[^:]+):Status"
      value_is_object: false

    - name: "VisitorEmpaticaDevice"
      redis_source_type: "key"
      redis_pattern: "Visitors:*:EmpaticaDeviceID"
      target_table: "global_state_events"
      id_parser_regex: "Visitors:(?P<ticket_id>[^:]+):EmpaticaDeviceID"
      value_is_object: false

    - name: "VisitorEmpaticaDeviceShort"
      redis_source_type: "key"
      redis_pattern: "Visitors:*:EmpaticaDeviceIDShort"
      target_table: "global_state_events"
      id_parser_regex: "Visitors:(?P<ticket_id>[^:]+):EmpaticaDeviceIDShort"
      value_is_object: false

    - name: "VisitorScentDevice"
      redis_source_type: "key"
      redis_pattern: "Visitors:*:ScentDeviceID"
      target_table: "global_state_events"
      id_parser_regex: "Visitors:(?P<ticket_id>[^:]+):ScentDeviceID"
      value_is_object: false

    - name: "VisitorETemp"
      redis_source_type: "key"
      redis_pattern: "Visitors:*:ETemp"
      target_table: "global_state_events"
      id_parser_regex: "Visitors:(?P<ticket_id>[^:]+):ETemp"
      value_is_object: false

    - name: "IO"
      redis_source_type: "key"
      redis_pattern: "IO:*"
      target_table: "global_state_events"
      id_parser_regex: "(?P<state_key>.*)" # Capture the entire key as state_key
      value_is_object: true

    - name: "KiosksDeviceAssignments"
      redis_source_type: "key"
      redis_pattern: "Rooms:*:Stage Data:*:*Device ID"
      target_table: "global_state_events"
      id_parser_regex: "(?P<state_key>.*)" # Capture the entire key as state_key
      value_is_object: false

    - name: "RoomsSceneName"
      redis_source_type: "key"
      redis_pattern: "Rooms:*:Scene Name:*"
      target_table: "global_state_events"
      id_parser_regex: "(?P<state_key>.*)" # Capture the entire key as state_key
      value_is_object: false

    - name: "Rooms"
      redis_source_type: "key"
      redis_pattern: "Rooms:*"
      target_table: "global_state_events"
      id_parser_regex: "(?P<state_key>.*)" # Capture the entire key as state_key
      value_is_object: true

    - name: "Galleries"
      redis_source_type: "key"
      redis_pattern: "Galleries:*"
      target_table: "global_state_events"
      id_parser_regex: "(?P<state_key>.*)" # Capture the entire key as state_key
      value_is_object: false

